name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# ─────────────────────────────────────────────────────────────────────────────
# Job 1：后端 Python 检查
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  backend:
    name: Backend (Python 3.12)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install ".[dev]"

      - name: Lint with ruff
        run: ruff check .

      - name: Run pytest
        # 排除 tests/memory/（ChromaDB PersistentClient 初始化时会拉取 ~1GB embedding 模型，CI OOM 必失败）
        # 排除 tests/e2e/ 和 tests/integration/（依赖真实 Ollama / 浏览器）
        run: |
          python -m pytest tests/ \
            --ignore=tests/memory \
            --ignore=tests/e2e \
            --ignore=tests/integration \
            -x --tb=short \
            -q
        env:
          # 确保不需要真实 API 密钥
          ANTHROPIC_API_KEY: "sk-ant-dummy-for-ci"
          OPENAI_API_KEY: "sk-dummy-for-ci"

# ─────────────────────────────────────────────────────────────────────────────
# Job 2：前端 Next.js 检查
# ─────────────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Node 22)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('web/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: web
        run: pnpm run build
        env:
          NODE_OPTIONS: "--max-old-space-size=2048"

      - name: Lint
        working-directory: web
        run: pnpm run lint
        # eslint 配置存在但暂无 .eslintignore，偶有警告不阻断 CI
        continue-on-error: true

# ─────────────────────────────────────────────────────────────────────────────
# Job 3：文档与许可证检查（轻量）
# ─────────────────────────────────────────────────────────────────────────────
  docs-check:
    name: Docs & License Check
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          for f in README.md LICENSE .gitignore; do
            if [ ! -f "$f" ]; then
              echo "❌ 缺失必要文件: $f"
              exit 1
            else
              echo "✅ $f 存在"
            fi
          done

      - name: Scan for leaked secrets in CLAUDE.md
        # 检测常见 Anthropic / OpenAI 密钥前缀，防止意外提交
        run: |
          if grep -rE "(sk-ant-[a-zA-Z0-9]{20,}|sk-proj-[a-zA-Z0-9]{20,}|sk-[a-zA-Z0-9]{48,})" \
               --include="*.md" --include="*.yml" --include="*.yaml" \
               --exclude-dir=".git" .; then
            echo "❌ 发现可能泄露的 API 密钥！"
            exit 1
          else
            echo "✅ 未发现泄露密钥"
          fi
