services:
  openagi:
    build: .
    ports:
      - "${PORT:-8888}:8888"
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env:ro
    environment:
      - OPENAGI_LOG_LEVEL=${OPENAGI_LOG_LEVEL:-INFO}
      - ZHIPU_API_KEY=${ZHIPU_API_KEY:-}
      - ZHIPU_API_BASE=${ZHIPU_API_BASE:-}
      - RELAY_CLAUDE_KEY=${RELAY_CLAUDE_KEY:-}
      - RELAY_CLAUDE_BASE=${RELAY_CLAUDE_BASE:-}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
    mem_limit: 4g
    cpus: 2.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
