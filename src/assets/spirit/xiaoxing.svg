<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- 紫色 5 角星背景光晕 -->
  <defs>
    <radialGradient id="starGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c4b5fd" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="leftEyeClip">
      <rect id="leftEyeLid" x="34" y="39" width="12" height="12" rx="6"/>
    </clipPath>
    <clipPath id="rightEyeClip">
      <rect id="rightEyeLid" x="54" y="39" width="12" height="12" rx="6"/>
    </clipPath>
  </defs>

  <!-- 光晕 -->
  <circle cx="50" cy="50" r="48" fill="url(#starGlow)"/>

  <!-- 紫色 5 角星主体 -->
  <path d="M50,8 L61,36 L92,36 L68,54 L77,82 L50,65 L23,82 L32,54 L8,36 L39,36 Z"
        fill="#7c3aed" stroke="#a78bfa" stroke-width="1.5"/>

  <!-- 星星内层高光 -->
  <path d="M50,15 L58,36 L80,36 L64,48 L71,70 L50,58 L29,70 L36,48 L20,36 L42,36 Z"
        fill="#8b5cf6" opacity="0.5"/>

  <!-- 左眼白 -->
  <circle cx="40" cy="45" r="7" fill="white"/>
  <!-- 左瞳孔（使用 clipPath 实现眨眼） -->
  <g clip-path="url(#leftEyeClip)">
    <circle cx="40" cy="45" r="7" fill="white"/>
    <circle cx="40" cy="45" r="3.5" fill="#1f2937" class="pupil-left"/>
    <circle cx="41.5" cy="43.5" r="1" fill="white" opacity="0.7"/>
  </g>

  <!-- 右眼白 -->
  <circle cx="60" cy="45" r="7" fill="white"/>
  <!-- 右瞳孔 -->
  <g clip-path="url(#rightEyeClip)">
    <circle cx="60" cy="45" r="7" fill="white"/>
    <circle cx="60" cy="45" r="3.5" fill="#1f2937" class="pupil-right"/>
    <circle cx="61.5" cy="43.5" r="1" fill="white" opacity="0.7"/>
  </g>

  <!-- 腮红 -->
  <circle cx="33" cy="52" r="4" fill="#f9a8d4" opacity="0.4"/>
  <circle cx="67" cy="52" r="4" fill="#f9a8d4" opacity="0.4"/>
</svg>
