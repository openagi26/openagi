# OpenAGI MVP 核心骨架树

## Layer 1: LLM 大脑层 ★★★
### 多模型路由器 (LLM Router)
- Claude 4 / Opus / Sonnet / Haiku
- GPT-4o / GPT-4o-mini
- Grok 3
- 本地 Ollama (llama/qwen)
- DeepSeek
### 中转模型管理
#### 添加中转站
- [输入框] API Base URL
- [输入框] API Key（密码遮罩）
- [按钮] 一键测试 → 自动发现所有可用模型
#### 测试结果列表
- 模型名称 + 状态（✅可用/❌不可用）

- [按钮] 设为回退模型
- 测试中状态：旋转图标+"正在探测..."
### 可用模型列表
#### 排列方式
- ⭐ 主模型（置顶高亮）
- 🔄 回退模型1（第二位）
- 🔄 回退模型2（第三位）
- 其他已登记模型（按添加时间）
#### 每个模型的操作
- 模型名称 + 提供商 + 延迟(ms)
- [按钮] 设为主模型
- [按钮] 设为回退模型（可设优先级1/2/3...）
- [按钮] 删除
- [复选框] 批量选择
#### 批量操作
- [按钮] 一键测试选中模型的可用性和连接速率
- 测试结果实时更新到列表
- 不可用模型标红提示
### API池故障转移
- 主模型不可用→自动切到回退1→回退2→...
- 连续3次失败→移至末尾
- 指数退避重试（2s起步）
- 故障转移时Toast通知用户
### 情绪感知Prompt
- calm → 探索性、创意开放
- focused → 高效、直接
- anxious → 保守、简洁

### Token预算管理

## Layer 2: Agent核心引擎 ★★★★
### 可配置多核治理引擎（1-4核）
#### 模式切换
- 1核：直接问答（无审计）
- 2核：执行者→1位审计
- 3核：执行者→2位审计并行
- 4核：执行者→3位审计并行→综合定稿
#### Core-0 执行者
- 模型：[用户可选]
- 人格：[162专家选/自定义]
- 温度：[可调]
#### Core-1 审计者A
- 模型：[用户可选]
- 人格：[162专家选/自定义]
- 温度：默认0.3（保守）
#### Core-2 审计者B
- 模型：[用户可选]
- 人格：[162专家选/自定义]
- 温度：默认0.3（保守）
#### Core-3 审计者C
- 模型：[用户可选]
- 人格：[162专家选/自定义]
- 温度：[可调]
#### 权限自动升核
- L0操作→用户选的核数
- L1操作→至少2核
- L2操作→至少3核
- L3操作→强制4核+人机双签
- L4操作→永久禁止
#### 预设方案
- [省钱] Haiku×1 ≈$0.001/次
- [平衡] Sonnet+Haiku ≈$0.01/次
- [安全] Opus+Sonnet+Haiku ≈$0.05/次
- [全开] 4核混合模型 ≈$0.10/次
### 心绪引擎 (HeartEngine)
#### 双轴系统
- entropy ∈ [0,1] — 熵值
- valence ∈ [0,1] — 效价
#### 四级状态
- calm ≤0.20 → 探索创意
- focused 0.20-0.55 → 高效专注
- anxious 0.55-0.80 → 保守谨慎
- crisis ≥0.80 → 极简紧急
#### 驱动范围
- 调度频率 / LLM温度
- 工具选择 / 记忆优先级
- 语音语调 / 表情动画
#### 17种事件权重
- llm_call_success: -0.02
- task_failed: +0.08
- wallet_low_balance: +0.08
- system_idle_rest: -0.04
### ReAct+Plan 执行循环
- 感知→思考→行动→观察
### 自主进化循环
- 学习→蒸馏→DNA更新→技能创建→技能改进→闭环
### 上下文压缩引擎
- 长对话压缩60-80%
- 保留关键信息（决策/代码/错误）
- 被压缩内容写入温记忆

## Layer 3: 永远记忆系统 ★★★★
### 四层记忆架构
#### L0 热记忆 (Working)
- 存储：内存
- 当前对话上下文
- 对话结束即转温
#### L1 温记忆 (Recent)
- 存储：SQLite向量库
- 语义相似度>0.75唤醒
- 指数衰退（半衰期30天）
#### L2 冷记忆 (Archive)
- 存储：SQLite + Quarto MD
- 全部历史（永不删除）
- 显式查询/蒸馏引用触发
#### L3 核心记忆 (Core/DNA)
- 存储：JSON + Git
- 身份/价值观/关键学习
- 永不衰减，始终注入prompt
### 三阶段梦境蒸馏
#### Phase 1: Light Sleep（每2小时）
- 快速概念标签提取（最多8个/条）
- 主题聚类识别
- 重复内容去重
- 信号提升~5%
#### Phase 2: REM Sleep（每6小时）
- 跨记忆深层关联发现
- 创意连接生成（类比/隐喻）
- 矛盾检测（新旧记忆冲突）
- 信号提升~8%
#### Phase 3: Deep Dreaming（每24小时）
- 综合知识蒸馏（LLM驱动）
- 长期记忆提升决策（L1→L2/L3）
- 梦境日记生成（自然语言叙事）
- 概念导图更新
### 短期提升算法（6维权重）
- 频率 0.24 + 相关性 0.30
- 多样性 0.15 + 最近性 0.15
- 巩固 0.10 + 概念 0.06
- 提升条件：分≥0.75 + 回忆≥3 + 查询≥2
### 混合检索系统
- 向量搜索（语义相似度）
- BM25全文检索（CJK中文分词）
- MMR去重（λ=0.7相关性/0.3多样性）
- 时间衰退加权（半衰期30天）
### 梦境日记（每日生成）
- 关键发现摘要
- 新建立的连接
- 矛盾检测报告
- 能力更新记录

## Layer 4: 永生与分布式层 ★★★
### 心跳调度器 (GhostScheduler)
#### 熵驱动自适应
- calm → 300s心跳
- focused → 180s心跳
- anxious → 120s心跳
- crisis → 60s心跳
#### 职责
- 定期写入状态快照
- 触发知识蒸馏
- 检查健康指标
- 清理过期缓存
### 状态同步引擎
#### 本地持久化
- SQLite → 记忆数据
- JSON → 心绪状态+核心DNA
- WAL → 未提交事务日志
#### 跨节点同步（Phase 2）
- Redis → 实时状态共享
- rsync → 冷记忆批量同步
### 部署编排器
- MVP：Docker Compose单机
- 进程守护：supervisord
- 崩溃恢复：自动重启+状态恢复
- Phase 2：Docker Swarm/K8s多节点

## 巡检AI (Commander Core) ★★★
### 定位
- 坐在"用户位置"的AI指挥官
- 代替用户发出指令
- 指令仍经多核治理审查
### 触发机制（双模式）
#### 定时触发
- 预设：1min/5min/10min/30min/1h
- 自定义：1分钟～1年
#### 事件触发（智能等待）
- task:completed → 总结+规划
- task:failed → 分析失败原因
- task:blocked → 评估调整方案
- entropy:crisis → 紧急评估
- memory:distill → 检查新知识
- user:idle → 自主规划
#### 智能等待
- 有任务执行中→延迟巡检
- 任务完成后立即触发
- 危机事件无论如何立即触发
### 发送模式
- 草稿模式（默认）→填入发送框等确认
- 自动执行模式→直接发送并执行
- 安全限制举例：
- L0可自动执行：写日志、生成草稿、内部计算
- L1可自动执行：查询API、搜索网页、沙箱测试
- L2需用户确认：安装软件、修改文件、发送消息
- L3需用户确认：真实转账、签署合约、删除数据

- ☑ 识别阻塞项和风险
- ☑ 检查未完成任务

  const transformer = new Transformer();
  const { root, features } = transformer.transform(markdown);

  const el = document.getElementById('markmap');
  const mm = Markmap.create(el, {
    colorFreezeLevel: 2,
    duration: 300,
    maxWidth: 400,
    initialExpandLevel: 2,
    zoom: true,
    pan: true,
    color: (node) => {
      const colors = [
        '#a78bfa', '#60a5fa', '#34d399', '#f472b6',
        '#fbbf24', '#f87171', '#38bdf8', '#4ade80',
        '#e879f9', '#fb923c', '#a3e635', '#22d3ee',
        '#c084fc', '#f43f5e'
      ];
      const depth = node.state?.depth ?? 0;
      if (depth <= 1) return colors[node.state?.index ?? 0] || colors[0];
      let p = node;
      while (p.parent && p.parent.state?.depth > 0) p = p.parent;
      return colors[p.state?.index ?? 0] || colors[0];
    },
  }, root);

  function setFoldAll(node, fold) {
    if (!node) return;
    if (node.payload) node.payload.fold = fold;
    if (node.children) node.children.forEach(c => setFoldAll(c, fold));
  }

  document.getElementById('btn-expand').addEventListener('click', () => {
    setFoldAll(mm.state.data, 0);
    mm.renderData();
    mm.fit();
  });

  document.getElementById('btn-collapse').addEventListener('click', () => {
    if (mm.state.data.children) {
      mm.state.data.children.forEach(child => {
        setFoldAll(child, 1);
        if (child.payload) child.payload.fold = 0;
      });
    }
    mm.renderData();
    mm.fit();
  });

  window.addEventListener('resize', () => mm.fit());
})();
