<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenAGI Companion</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <!-- 顶部：窗口控制 + 拖拽 + 功能按钮 -->
      <div id="top-bar">
        <div id="window-controls">
          <button class="win-btn close" id="win-close" title="关闭">&#x2715;</button>
          <button class="win-btn minimize" id="win-minimize" title="缩小到后台">&#x2212;</button>
          <button class="win-btn maximize" id="win-maximize" title="全屏">&#x2610;</button>
        </div>
        <div id="drag-handle" data-tauri-drag-region></div>
        <div id="controls">
          <button id="convo-btn" class="ctrl-btn" title="连续对话模式（面对面交流）">🎙️</button>
          <button id="camera-btn" class="ctrl-btn" title="摄像头（看外面）">📷</button>
          <button id="focus-btn" class="ctrl-btn" title="开启专注模式">🎯</button>
          <button id="avatar-btn" class="ctrl-btn" title="切换形象">🎭</button>
          <button id="speaker-btn" class="ctrl-btn active" title="语音朗读开关">🔊</button>
        </div>
      </div>

      <!-- 形象区域 -->
      <div id="avatar-container">
        <canvas id="star-spirit" width="200" height="200"></canvas>
        <div id="emotion-label">neutral</div>
      </div>

      <!-- 气泡对话区域 -->
      <div id="chat-container">
        <div id="messages"></div>
        <div id="input-area">
          <button id="mic-btn" class="ctrl-btn mic" title="语音输入">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
              <line x1="12" y1="19" x2="12" y2="23"/>
              <line x1="8" y1="23" x2="16" y2="23"/>
            </svg>
          </button>
          <input
            type="text"
            id="message-input"
            placeholder="和小星说话..."
            autocomplete="off"
          />
          <button id="send-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- 状态指示器 -->
      <div id="status-bar">
        <span id="backend-status" class="status-dot offline"></span>
        <span id="status-text">connecting...</span>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
